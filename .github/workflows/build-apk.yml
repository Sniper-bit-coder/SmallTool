name: 自动生成安卓安装包 (图标完美修复版)
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 拉取代码
        uses: actions/checkout@v4

      - name: 2. 准备 Java 环境
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. 准备 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 4. 隔离网页资源
        run: |
          mkdir -p www
          cp *.html *.js *.css *.json *.jpg *.png www/ || true
          echo '{
            "name": "politics-app",
            "version": "1.0.0",
            "dependencies": {
              "@capacitor/android": "^5.0.0",
              "@capacitor/cli": "^5.0.0",
              "@capacitor/core": "^5.0.0"
            }
          }' > package.json

      - name: 5. 安装依赖
        run: npm install

      - name: 6. 初始化 Capacitor 平台
        run: |
          echo '{
            "appId": "com.sniper.politics",
            "appName": "政治背诵助手",
            "webDir": "www",
            "bundledWebRuntime": false
          }' > capacitor.config.json
          npx cap add android

      - name: 7. 暴力注入图标 (解决图标不对的问题)
        run: |
          # 定义所有安卓分辨率目录
          DIMS=("mdpi" "hdpi" "xhdpi" "xxhdpi" "xxxhdpi")
          
          # 遍历所有目录，强制替换默认的图标文件
          for dim in "${DIMS[@]}"; do
            # 确保目录存在
            RES_DIR="android/app/src/main/res/mipmap-$dim"
            mkdir -p $RES_DIR
            
            # 覆盖常规图标、圆角图标和前景图标
            cp -f logo.png $RES_DIR/ic_launcher.png
            cp -f logo.png $RES_DIR/ic_launcher_round.png
            cp -f logo.png $RES_DIR/ic_launcher_foreground.png
          done
          
          # 处理自适应图标的背景（强制设为白色或使用你的logo，防止出现黑边）
          # 我们直接把背景也换成你的logo或者纯色配置
          echo '<?xml version="1.0" encoding="utf-8"?><adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android"><background android:drawable="@mipmap/ic_launcher_foreground"/><foreground android:drawable="@mipmap/ic_launcher_foreground"/></adaptive-icon>' > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          echo '<?xml version="1.0" encoding="utf-8"?><adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android"><background android:drawable="@mipmap/ic_launcher_foreground"/><foreground android:drawable="@mipmap/ic_launcher_foreground"/></adaptive-icon>' > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml

      - name: 8. 执行安卓编译
        run: |
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 9. 导出 APK 文件
        uses: actions/upload-artifact@v4
        with:
          name: Politics-Assistant-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
