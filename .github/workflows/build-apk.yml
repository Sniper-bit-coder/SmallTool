name: 自动生成安卓安装包 (终极修复版)
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 拉取代码
        uses: actions/checkout@v4

      - name: 2. 准备 Java 环境
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. 准备 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 4. 强制构造项目环境
        run: |
          # 建立一个标准的 Node 项目结构
          echo '{
            "name": "politics-app",
            "version": "1.0.0",
            "dependencies": {
              "@capacitor/android": "^5.0.0",
              "@capacitor/cli": "^5.0.0",
              "@capacitor/core": "^5.0.0"
            }
          }' > package.json
          
          # 安装打包工具
          npm install

      - name: 5. 初始化配置并添加安卓平台
        run: |
          # 创建配置文件，明确告诉工具网页就在当前根目录
          echo '{
            "appId": "com.sniper.politics",
            "appName": "政治背诵助手",
            "webDir": ".",
            "bundledWebRuntime": false
          }' > capacitor.config.json
          
          # 物理创建安卓工程文件夹
          npx cap add android

      - name: 6. 注入图标
        run: |
          # 将你的 logo.png 强制覆盖到安卓默认图标位置
          # 这一步能确保生成的 APK 桌面图标是你那张蓝色的图
          mkdir -p android/app/src/main/res/drawable
          cp logo.png android/app/src/main/res/drawable/ic_launcher_foreground.png || true

      - name: 7. 编译 APK
        run: |
          # 同步网页文件到安卓工程
          npx cap sync android
          # 进入安卓目录执行最终编译
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 8. 导出 APK 文件
        uses: actions/upload-artifact@v4
        with:
          name: Politics-Assistant-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
