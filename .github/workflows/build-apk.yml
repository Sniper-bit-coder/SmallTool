name: 自动生成安卓安装包 (隔离修复版)
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 拉取代码
        uses: actions/checkout@v4

      - name: 2. 准备 Java 环境
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. 准备 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 4. 隔离网页资源 (核心修复步骤)
        run: |
          # 创建一个完全干净的输出目录
          mkdir -p www
          # 只拷贝网页运行需要的文件，不拷贝隐藏文件夹
          cp *.html *.js *.css *.json *.jpg *.png www/ || true
          
          # 创建一个标准的 package.json
          echo '{
            "name": "politics-app",
            "version": "1.0.0",
            "dependencies": {
              "@capacitor/android": "^5.0.0",
              "@capacitor/cli": "^5.0.0",
              "@capacitor/core": "^5.0.0"
            }
          }' > package.json

      - name: 5. 安装依赖
        run: npm install

      - name: 6. 初始化 Capacitor 平台
        run: |
          # 强制生成配置文件，webDir 指向隔离后的 www
          echo '{
            "appId": "com.sniper.politics",
            "appName": "政治背诵助手",
            "webDir": "www",
            "bundledWebRuntime": false
          }' > capacitor.config.json
          
          # 添加安卓平台
          npx cap add android

      - name: 7. 注入你的 Logo 图标
        run: |
          # 覆盖安卓工程里的默认机器人图标
          mkdir -p android/app/src/main/res/drawable
          cp logo.png android/app/src/main/res/drawable/ic_launcher_foreground.png || true

      - name: 8. 执行安卓编译
        run: |
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 9. 导出 APK 文件
        uses: actions/upload-artifact@v4
        with:
          name: Politics-Assistant-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
