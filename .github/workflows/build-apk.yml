name: 自动生成安卓安装包 (稳定增强版)
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 拉取代码
        uses: actions/checkout@v4

      - name: 2. 准备 Java 环境
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. 准备 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 4. 整理网页资源 (解决递归拷贝问题)
        run: |
          # 创建一个纯粹的网页存放目录 www
          mkdir www
          # 将所有网页相关文件拷贝进去（排除掉不需要打包进 App 的文件）
          cp *.html *.js *.css *.json *.jpg *.png www/ || true
          # 确保 package.json 存在
          echo '{ "name": "politics-app", "version": "1.0.0" }' > package.json

      - name: 5. 安装并初始化 Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          # 关键：设置 --web-dir 为刚刚创建的 www
          npx cap init "政治背诵助手" "com.sniper.politics" --web-dir www
          npx cap add android

      - name: 6. 同步资源并开始编译
        run: |
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 7. 导出最终 APK
        uses: actions/upload-artifact@v4
        with:
          name: Politics-Assistant-APK
          # 这里的路径是 Capacitor 生成 APK 的标准路径
          path: android/app/build/outputs/apk/debug/app-debug.apk
