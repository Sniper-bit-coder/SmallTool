name: 自动生成安卓安装包 (图标缩放完美修复版)
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 拉取代码
        uses: actions/checkout@v4

      - name: 2. 准备 Java 环境
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. 准备 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 4. 隔离网页资源
        run: |
          mkdir -p www
          cp *.html *.js *.css *.json *.jpg *.png www/ || true
          echo '{ "name": "politics-app", "version": "1.0.0", "dependencies": { "@capacitor/android": "^5.0.0", "@capacitor/cli": "^5.0.0", "@capacitor/core": "^5.0.0" } }' > package.json

      - name: 5. 安装依赖
        run: npm install

      - name: 6. 初始化 Capacitor 平台
        run: |
          echo '{ "appId": "com.sniper.politics", "appName": "政治背诵助手", "webDir": "www", "bundledWebRuntime": false }' > capacitor.config.json
          npx cap add android

      - name: 7. 专业级图标缩放处理 (ImageMagick)
        run: |
          # 安装图像处理工具
          sudo apt-get install -y imagemagick
          
          # 颜色定义：使用你 CSS 里的主色调靛蓝 #5865f2
          BG_COLOR="#5865f2"
          
          # 处理流程：
          # 1. 将原图缩小并居中，四周留出透明/背景色边距（防止被安卓遮罩裁剪）
          # 2. 生成前景图 (foreground) - 缩小到 60%，确保神庙在安全区内
          convert logo.png -resize 60%x60% -gravity center -background none -extent 1024x1024 foreground.png
          
          # 3. 暴力替换所有 mipmap 目录下的图片
          DIMS=("mdpi" "hdpi" "xhdpi" "xxhdpi" "xxxhdpi")
          for dim in "${DIMS[@]}"; do
            RES_DIR="android/app/src/main/res/mipmap-$dim"
            mkdir -p $RES_DIR
            cp -f logo.png $RES_DIR/ic_launcher.png
            cp -f logo.png $RES_DIR/ic_launcher_round.png
            cp -f foreground.png $RES_DIR/ic_launcher_foreground.png
          done

          # 4. 关键：定义 XML 背景颜色，解决缩放和裁剪产生的黑边问题
          VALUES_DIR="android/app/src/main/res/values"
          mkdir -p $VALUES_DIR
          echo "<?xml version='1.0' encoding='utf-8'?><resources><color name='ic_launcher_background'>$BG_COLOR</color></resources>" > $VALUES_DIR/colors.xml

          # 5. 重写自适应图标定义
          ANYDPI_DIR="android/app/src/main/res/mipmap-anydpi-v26"
          mkdir -p $ANYDPI_DIR
          echo "<?xml version='1.0' encoding='utf-8'?><adaptive-icon xmlns:android='http://schemas.android.com/apk/res/android'><background android:drawable='@color/ic_launcher_background'/><foreground android:drawable='@mipmap/ic_launcher_foreground'/></adaptive-icon>" > $ANYDPI_DIR/ic_launcher.xml
          echo "<?xml version='1.0' encoding='utf-8'?><adaptive-icon xmlns:android='http://schemas.android.com/apk/res/android'><background android:drawable='@color/ic_launcher_background'/><foreground android:drawable='@mipmap/ic_launcher_foreground'/></adaptive-icon>" > $ANYDPI_DIR/ic_launcher_round.xml

      - name: 8. 执行安卓编译
        run: |
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 9. 导出最终 APK
        uses: actions/upload-artifact@v4
        with:
          name: Politics-Assistant-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
